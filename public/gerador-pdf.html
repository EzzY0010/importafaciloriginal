<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de PDF - Comprovante</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #fff;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 28px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 22px;
            color: #D4AF37;
        }
        p.sub { margin: 0 0 24px; color: #94a3b8; font-size: 14px; }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin: 14px 0 6px;
            color: #cbd5e1;
        }
        input, textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #ffffff;
            color: #000000;
            font-size: 15px;
            font-family: inherit;
        }
        textarea { min-height: 90px; resize: vertical; }
        button {
            margin-top: 22px;
            width: 100%;
            padding: 15px;
            background-color: #25d366;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
        }
        button:hover { background-color: #128c7e; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .status { margin-top: 14px; font-size: 13px; text-align: center; min-height: 18px; }
        .ok { color: #4ade80; }
        .err { color: #f87171; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Gerador de Comprovante</h1>
        <p class="sub">Preencha os dados e gere o PDF direto no seu dispositivo.</p>

        <label for="nome">Nome</label>
        <input id="nome" type="text" placeholder="Nome completo" />

        <label for="data">Data</label>
        <input id="data" type="date" />

        <label for="pedido">Pedido</label>
        <textarea id="pedido" placeholder="Descrição do pedido..."></textarea>

        <button id="btn" onclick="gerarPDF()">Gerar PDF</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        // Pré-preenche a data com hoje
        document.getElementById('data').valueAsDate = new Date();

        function setStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + (type || '');
        }

        function formatarData(iso) {
            if (!iso) return '-';
            const [y, m, d] = iso.split('-');
            return `${d}/${m}/${y}`;
        }

        async function gerarPDF() {
            const btn = document.getElementById('btn');
            const nome = document.getElementById('nome').value.trim();
            const data = document.getElementById('data').value;
            const pedido = document.getElementById('pedido').value.trim();

            if (!nome || !data || !pedido) {
                setStatus('Preencha todos os campos antes de gerar.', 'err');
                return;
            }

            try {
                btn.disabled = true;
                setStatus('Gerando PDF...', '');

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });

                // Cabeçalho
                doc.setFillColor(15, 23, 42);
                doc.rect(0, 0, 210, 30, 'F');
                doc.setTextColor(212, 175, 55);
                doc.setFontSize(20);
                doc.setFont('helvetica', 'bold');
                doc.text('Comprovante', 20, 20);

                // Corpo
                doc.setTextColor(0, 0, 0);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(12);

                let y = 50;
                const linha = (label, valor) => {
                    doc.setFont('helvetica', 'bold');
                    doc.text(label, 20, y);
                    doc.setFont('helvetica', 'normal');
                    const wrapped = doc.splitTextToSize(String(valor), 150);
                    doc.text(wrapped, 55, y);
                    y += 8 * wrapped.length + 4;
                };

                linha('Nome:', nome);
                linha('Data:', formatarData(data));
                linha('Pedido:', pedido);

                // Linha decorativa
                doc.setDrawColor(212, 175, 55);
                doc.setLineWidth(0.5);
                doc.line(20, y + 4, 190, y + 4);

                // Rodapé
                doc.setFontSize(10);
                doc.setTextColor(120, 120, 120);
                doc.text(
                    `Emitido em ${new Date().toLocaleString('pt-BR')}`,
                    20,
                    285
                );

                // Download forçado via Blob + <a>
                const blob = doc.output('blob');
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'comprovante.pdf';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 1000);

                setStatus('PDF gerado com sucesso!', 'ok');
            } catch (e) {
                console.error(e);
                setStatus('Erro ao gerar PDF: ' + e.message, 'err');
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
